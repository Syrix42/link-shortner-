services:
  db:
    image: postgres:16-alpine
    container_name: link_shortener_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: link_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/dev/sda1/docker/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d link_shortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link_shortener_app_dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: link_shortener
      DB_SSLMODE: disable
      JWT_SECRET: super-secret-change-me
    ports:
      - "3000:3000"

volumes:
  pg_data_dev: